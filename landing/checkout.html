<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Checkout — Cheatly</title>
  <meta name="description" content="Start your Cheatly Pro free trial." />
  <meta name="robots" content="noindex" />
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" type="image/png" sizes="16x16" href="icon16.png" />
  <link rel="icon" type="image/png" sizes="48x48" href="icon48.png" />
  <link rel="apple-touch-icon" href="icon128.png" />
  <style>
    .checkout-card { max-width: 460px; }
    .checkout-summary {
      background: #f4faf6;
      border: 1px solid #d7ecdd;
      border-radius: 12px;
      padding: 18px 20px;
      margin-bottom: 22px;
      text-align: left;
    }
    .checkout-summary-row {
      display: flex;
      justify-content: space-between;
      margin: 6px 0;
      font-size: 0.95rem;
      color: #374151;
    }
    .checkout-summary-row.total {
      border-top: 1px solid #d7ecdd;
      padding-top: 10px;
      margin-top: 10px;
      font-weight: 700;
      color: #111827;
    }
    .checkout-summary h2 {
      font-size: 1.05rem;
      margin: 0 0 8px;
    }
    .checkout-trial-note { color: #059669; font-weight: 600; }
    #payment-element { margin: 18px 0; min-height: 90px; }
    .checkout-secure {
      font-size: 0.8rem;
      color: #6b7280;
      margin-top: 14px;
    }
  </style>
</head>
<body>
  <nav class="nav">
    <div class="container nav-inner">
      <a href="index.html" class="nav-logo">
        <img src="icon48.png" alt="Cheatly logo" width="28" height="28" />
        <span>Cheatly</span>
      </a>
      <div class="nav-links">
        <span id="user-email" class="nav-email"></span>
        <a href="dashboard.html">Back to Dashboard</a>
      </div>
    </div>
  </nav>

  <section class="auth-section">
    <div class="container">
      <div class="auth-card checkout-card">
        <h1>Start your free trial</h1>
        <p class="auth-subtitle" id="status-line">Loading secure checkout…</p>

        <div class="checkout-summary">
          <h2>Cheatly Pro</h2>
          <div class="checkout-summary-row"><span>7-day free trial</span><span class="checkout-trial-note">$0.00 today</span></div>
          <div class="checkout-summary-row"><span>After trial</span><span>$25.00 / month</span></div>
          <div class="checkout-summary-row"><span>Cancel anytime</span><span>—</span></div>
          <div class="checkout-summary-row total"><span>Total due today</span><span>$0.00</span></div>
        </div>

        <form id="payment-form" hidden>
          <div id="payment-element"></div>
          <p class="form-error" id="payment-error"></p>
          <button type="submit" id="submit-btn" class="btn btn-primary btn-block">Start Free Trial</button>
        </form>

        <p class="checkout-secure">🔒 Payments secured by Stripe. Your card won't be charged until your 7-day trial ends.</p>
      </div>
    </div>
  </section>

  <script src="https://js.stripe.com/v3/"></script>
  <script src="auth.js"></script>
  <script>
    (async () => {
      const statusLine = document.getElementById("status-line");
      const form = document.getElementById("payment-form");
      const errorEl = document.getElementById("payment-error");
      const submitBtn = document.getElementById("submit-btn");

      if (!CheatlyAuth.get()) {
        window.location.href = "login.html";
        return;
      }

      async function activate(setupIntentId) {
        statusLine.textContent = "Activating your trial…";
        form.hidden = true;
        const me = await api("/api/subscribe/activate", {
          method: "POST",
          body: JSON.stringify({ setup_intent_id: setupIntentId }),
        });
        if (me.subscribed) {
          window.location.href = "dashboard.html?checkout=success";
        } else {
          throw new Error("Subscription could not be activated. Please contact support.");
        }
      }

      // Handle return from a redirect-based payment method
      const params = new URLSearchParams(location.search);
      if (params.get("setup_intent") && params.get("redirect_status") === "succeeded") {
        try {
          await activate(params.get("setup_intent"));
          return;
        } catch (err) {
          statusLine.textContent = err.message;
          return;
        }
      }

      let setup;
      try {
        setup = await api("/api/subscribe/setup", { method: "POST" });
      } catch (err) {
        if (err.message === "Already subscribed") {
          window.location.href = "dashboard.html";
          return;
        }
        statusLine.textContent = err.message;
        return;
      }

      document.getElementById("user-email").textContent = setup.email;
      statusLine.textContent = "No charge for 7 days. Cancel anytime before your trial ends.";

      const stripe = Stripe(setup.publishable_key);
      const elements = stripe.elements({
        clientSecret: setup.client_secret,
        appearance: {
          theme: "stripe",
          variables: { colorPrimary: "#10b981", borderRadius: "8px" },
        },
      });
      elements.create("payment").mount("#payment-element");
      form.hidden = false;

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        errorEl.textContent = "";
        submitBtn.disabled = true;
        submitBtn.textContent = "Processing…";
        try {
          const result = await stripe.confirmSetup({
            elements,
            confirmParams: { return_url: window.location.origin + "/checkout.html" },
            redirect: "if_required",
          });
          if (result.error) throw new Error(result.error.message);
          await activate(result.setupIntent.id);
        } catch (err) {
          errorEl.textContent = err.message;
          form.hidden = false;
          submitBtn.disabled = false;
          submitBtn.textContent = "Start Free Trial";
          statusLine.textContent = "No charge for 7 days. Cancel anytime before your trial ends.";
        }
      });
    })();
  </script>
</body>
</html>
