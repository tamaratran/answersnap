<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log In — Cheatly</title>
  <meta name="description" content="Log in to your Cheatly account." />
  <meta name="robots" content="noindex" />
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" type="image/png" sizes="16x16" href="icon16.png" />
  <link rel="icon" type="image/png" sizes="48x48" href="icon48.png" />
  <link rel="apple-touch-icon" href="icon128.png" />
</head>
<body>
  <nav class="nav">
    <div class="container nav-inner">
      <a href="index.html" class="nav-logo">
        <img src="icon48.png" alt="Cheatly logo" width="28" height="28" />
        <span>Cheatly</span>
      </a>
      <div class="nav-links">
        <a href="signup.html">Sign Up</a>
      </div>
    </div>
  </nav>

  <section class="auth-section">
    <div class="container">
      <div class="auth-card">
        <h1>Welcome back</h1>
        <p class="auth-subtitle">Log in to your Cheatly account.</p>
        <form id="login-form">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required autocomplete="email" placeholder="you@example.com" />
          <label for="password">Password</label>
          <input type="password" id="password" name="password" required autocomplete="current-password" placeholder="Your password" />
          <p class="form-error"></p>
          <button type="submit" class="btn btn-primary btn-block">Log In</button>
        </form>
        <p class="auth-switch">New to Cheatly? <a href="signup.html">Create an account</a></p>
      </div>
    </div>
  </section>

  <script src="auth.js"></script>
  <script>bindAuthForm("login-form", "/api/login");</script>
</body>
</html>
