<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cheatly — What Platform Do You Use?</title>
  <meta name="description" content="Select your testing platform and see how Cheatly delivers 100% accuracy on any quiz." />
  <meta name="theme-color" content="#10b981" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="onboarding.css" />
  <link rel="stylesheet" href="wins.css" />
  <link rel="icon" href="icon16.png" sizes="16x16" type="image/png" />
  <link rel="icon" href="icon48.png" sizes="48x48" type="image/png" />
  <link rel="icon" href="icon128.png" sizes="128x128" type="image/png" />
  <link rel="apple-touch-icon" href="icon128.png" />

  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-CF2V24H2RE"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-CF2V24H2RE');
  </script>
</head>
<body>
  <!-- Nav -->
  <nav class="nav">
    <div class="container nav-inner">
      <a href="/" class="nav-logo">
        <img src="icon48.png" alt="Cheatly" class="logo-img" width="28" height="28" />
        <span>Cheatly</span>
      </a>
    </div>
  </nav>

  <section class="onboarding-hero">
    <div class="container">
      <div class="onboarding-progress">
        <div class="progress-step active" id="step-1">1</div>
        <div class="progress-line"></div>
        <div class="progress-step" id="step-2">2</div>
        <div class="progress-line"></div>
        <div class="progress-step" id="step-3">3</div>
        <div class="progress-line"></div>
        <div class="progress-step" id="step-4">4</div>
      </div>
      
      <h1>What platform do you use?</h1>
      <p class="onboarding-subtitle">Select your testing platform below, or search for it</p>

      <div class="platform-grid">
        <button class="platform-card" data-platform="Canvas">
          <div class="platform-icon">
            <img src="https://www.google.com/s2/favicons?domain=instructure.com&amp;sz=64" alt="Canvas logo" width="32" height="32" loading="lazy">
          </div>
          <span class="platform-name">Canvas</span>
          <span class="platform-check">&#10003;</span>
        </button>
        <button class="platform-card" data-platform="Blackboard">
          <div class="platform-icon">
            <img src="https://www.google.com/s2/favicons?domain=blackboard.com&amp;sz=64" alt="Blackboard logo" width="32" height="32" loading="lazy">
          </div>
          <span class="platform-name">Blackboard</span>
          <span class="platform-check">&#10003;</span>
        </button>
        <button class="platform-card" data-platform="Google Forms">
          <div class="platform-icon">
            <img src="https://www.google.com/s2/favicons?domain=docs.google.com&amp;sz=64" alt="Google Forms logo" width="32" height="32" loading="lazy">
          </div>
          <span class="platform-name">Google Forms</span>
          <span class="platform-check">&#10003;</span>
        </button>
        <button class="platform-card" data-platform="Google Classroom">
          <div class="platform-icon">
            <img src="https://www.google.com/s2/favicons?domain=classroom.google.com&amp;sz=64" alt="Google Classroom logo" width="32" height="32" loading="lazy">
          </div>
          <span class="platform-name">Google Classroom</span>
          <span class="platform-check">&#10003;</span>
        </button>
        <button class="platform-card" data-platform="Quizlet">
          <div class="platform-icon">
            <img src="https://www.google.com/s2/favicons?domain=quizlet.com&amp;sz=64" alt="Quizlet logo" width="32" height="32" loading="lazy">
          </div>
          <span class="platform-name">Quizlet</span>
          <span class="platform-check">&#10003;</span>
        </button>
        <button class="platform-card" data-platform="Moodle">
          <div class="platform-icon">
            <img src="https://www.google.com/s2/favicons?domain=moodle.org&amp;sz=64" alt="Moodle logo" width="32" height="32" loading="lazy">
          </div>
          <span class="platform-name">Moodle</span>
          <span class="platform-check">&#10003;</span>
        </button>
        <button class="platform-card" data-platform="Kahoot">
          <div class="platform-icon">
            <img src="https://www.google.com/s2/favicons?domain=kahoot.com&amp;sz=64" alt="Kahoot logo" width="32" height="32" loading="lazy">
          </div>
          <span class="platform-name">Kahoot</span>
          <span class="platform-check">&#10003;</span>
        </button>
        <button class="platform-card" data-platform="Coursera">
          <div class="platform-icon">
            <img src="https://www.google.com/s2/favicons?domain=coursera.org&amp;sz=64" alt="Coursera logo" width="32" height="32" loading="lazy">
          </div>
          <span class="platform-name">Coursera</span>
          <span class="platform-check">&#10003;</span>
        </button>
        <button class="platform-card" data-platform="Khan Academy">
          <div class="platform-icon">
            <img src="https://www.google.com/s2/favicons?domain=khanacademy.org&amp;sz=64" alt="Khan Academy logo" width="32" height="32" loading="lazy">
          </div>
          <span class="platform-name">Khan Academy</span>
          <span class="platform-check">&#10003;</span>
        </button>
        <button class="platform-card" data-platform="McGraw-Hill Connect">
          <div class="platform-icon">
            <img src="https://www.google.com/s2/favicons?domain=mheducation.com&amp;sz=64" alt="McGraw-Hill Connect logo" width="32" height="32" loading="lazy">
          </div>
          <span class="platform-name">McGraw-Hill</span>
          <span class="platform-check">&#10003;</span>
        </button>
        <button class="platform-card" data-platform="Pearson MyLab">
          <div class="platform-icon">
            <img src="https://www.google.com/s2/favicons?domain=pearson.com&amp;sz=64" alt="Pearson MyLab logo" width="32" height="32" loading="lazy">
          </div>
          <span class="platform-name">Pearson MyLab</span>
          <span class="platform-check">&#10003;</span>
        </button>
        <button class="platform-card" data-platform="D2L Brightspace">
          <div class="platform-icon">
            <img src="https://www.google.com/s2/favicons?domain=d2l.com&amp;sz=64" alt="D2L Brightspace logo" width="32" height="32" loading="lazy">
          </div>
          <span class="platform-name">Brightspace</span>
          <span class="platform-check">&#10003;</span>
        </button>
      </div>

      <div class="search-section">
        <p class="search-label">Don't see your platform?</p>
        <div class="search-wrapper">
          <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" class="search-input" id="platform-search" placeholder="Type your platform name..." autocomplete="off" />
        </div>
        <div class="search-result hidden" id="search-result">
          <div class="search-checking" id="search-checking">
            <div class="checking-spinner"></div>
            <span>Checking compatibility...</span>
          </div>
          <div class="search-confirmed hidden" id="search-confirmed">
            <div class="confirmed-icon">&#10003;</div>
            <div class="confirmed-text">
              <span class="confirmed-platform" id="confirmed-platform"></span>
              <span class="confirmed-msg">Supported with 100% accuracy</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>

  <script src="auth.js"></script>
  <script>
    if (!window.CheatlyAuth || !CheatlyAuth.get()) window.location.href = "signup.html";
  </script>
  <script src="onboarding.js"></script>
  <script defer src="social-proof.js"></script>
  <script defer src="analytics.js"></script>
  <script defer src="/_vercel/insights/script.js"></script>
</body>
</html>
