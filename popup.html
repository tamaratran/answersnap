<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AnswerSnap</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="popup">
    <div class="header">
      <div class="logo">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#818cf8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/>
          <line x1="12" y1="17" x2="12.01" y2="17"/>
        </svg>
        <span class="logo-text">AnswerSnap</span>
      </div>
      <label class="toggle">
        <input type="checkbox" id="enabled-toggle" checked />
        <span class="toggle-slider"></span>
      </label>
    </div>

    <div class="section">
      <label class="label">OpenAI API Key</label>
      <div class="input-group">
        <input
          type="password"
          id="api-key"
          placeholder="sk-..."
          autocomplete="off"
        />
        <button id="toggle-key-visibility" class="icon-btn" title="Show/Hide">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
    </div>

    <div class="section">
      <label class="label">Display Mode</label>
      <div class="mode-options">
        <button class="mode-btn" data-mode="invisible">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
            <line x1="1" y1="1" x2="23" y2="23"/>
          </svg>
          <span>Invisible</span>
          <small>Clipboard only</small>
        </button>
        <button class="mode-btn" data-mode="sneaky">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="8" x2="12" y2="12"/>
            <line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
          <span>Sneaky</span>
          <small>Tiny indicator</small>
        </button>
        <button class="mode-btn active" data-mode="homework">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
            <line x1="3" y1="9" x2="21" y2="9"/>
            <line x1="9" y1="21" x2="9" y2="9"/>
          </svg>
          <span>Homework</span>
          <small>Full overlay</small>
        </button>
      </div>
    </div>

    <div class="section">
      <label class="label">Model</label>
      <select id="model-select">
        <option value="gpt-4o">GPT-4o (Recommended)</option>
        <option value="gpt-4o-mini">GPT-4o Mini (Faster)</option>
        <option value="gpt-4.1">GPT-4.1</option>
        <option value="gpt-4.1-mini">GPT-4.1 Mini</option>
      </select>
    </div>

    <div class="footer">
      <div class="status" id="status"></div>
      <div class="shortcut">
        <kbd>Alt</kbd> + <kbd>A</kbd> to toggle &middot; <kbd>Double-click</kbd> to answer
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
