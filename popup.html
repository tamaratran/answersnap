<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AnswerSnap</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="popup">
    <div class="header">
      <div class="logo">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#818cf8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/>
          <line x1="12" y1="17" x2="12.01" y2="17"/>
        </svg>
        <span class="logo-text">AnswerSnap</span>
      </div>
      <label class="toggle">
        <input type="checkbox" id="enabled-toggle" checked />
        <span class="toggle-slider"></span>
      </label>
    </div>


    <div class="footer">
      <div class="status" id="status"></div>
      <div class="shortcut">
        <kbd>Alt</kbd> + <kbd>A</kbd> to toggle &middot; <kbd>Double-click</kbd> to answer
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
