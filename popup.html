<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cheatly</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="popup">
    <div class="header">
      <div class="logo">
        <img src="icons/icon48.png" alt="Cheatly" width="24" height="24" />
        <span class="logo-text">Cheatly</span>
      </div>
      <label class="toggle" id="toggle-wrap" style="display:none">
        <input type="checkbox" id="enabled-toggle" checked />
        <span class="toggle-slider"></span>
      </label>
    </div>

    <!-- Auth View (Login / Register) -->
    <div id="auth-view">
      <div class="auth-tabs">
        <button class="auth-tab active" data-tab="login">Log In</button>
        <button class="auth-tab" data-tab="register">Sign Up</button>
      </div>

      <div class="auth-form" id="login-form">
        <input type="email" id="login-email" placeholder="Email" autocomplete="email" />
        <input type="password" id="login-password" placeholder="Password" autocomplete="current-password" />
        <button class="auth-btn" id="login-btn">Log In</button>
      </div>

      <div class="auth-form hidden" id="register-form">
        <input type="email" id="register-email" placeholder="Email" autocomplete="email" />
        <input type="password" id="register-password" placeholder="Password (6+ chars)" autocomplete="new-password" />
        <button class="auth-btn" id="register-btn">Create Account</button>
      </div>

      <div class="auth-error hidden" id="auth-error"></div>
    </div>

    <!-- Main View (logged in) -->
    <div id="main-view" class="hidden">
      <div class="user-bar">
        <span class="user-email" id="user-email"></span>
        <button class="logout-btn" id="logout-btn">Log out</button>
      </div>

      <div class="sub-status" id="sub-status">
        <div class="sub-badge" id="sub-badge"></div>
        <div class="sub-detail" id="sub-detail"></div>
      </div>

      <div id="subscribe-cta" class="hidden">
        <a id="subscribe-link" href="https://cheatly-backend.fly.dev/checkout" target="_blank" class="subscribe-btn">Start Free Trial</a>
        <p class="subscribe-hint">7-day free trial, then $25/month</p>
      </div>

      <div id="settings-section" class="hidden">
        <div class="section">
          <label class="label">Display Mode</label>
          <div class="mode-options">
            <button class="mode-btn" data-mode="invisible">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
                <line x1="1" y1="1" x2="23" y2="23"/>
              </svg>
              <span>Invisible</span>
              <small>Clipboard only</small>
            </button>
            <button class="mode-btn" data-mode="sneaky">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10"/>
                <line x1="12" y1="8" x2="12" y2="12"/>
                <line x1="12" y1="16" x2="12.01" y2="16"/>
              </svg>
              <span>Sneaky</span>
              <small>Tiny indicator</small>
            </button>
            <button class="mode-btn active" data-mode="homework">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                <line x1="3" y1="9" x2="21" y2="9"/>
                <line x1="9" y1="21" x2="9" y2="9"/>
              </svg>
              <span>Homework</span>
              <small>Full overlay</small>
            </button>
          </div>
        </div>
      </div>
    </div>

    <div class="footer">
      <div class="status" id="status"></div>
      <div class="shortcut" id="shortcut-hint" style="display:none">
        <kbd>Alt</kbd> + <kbd>A</kbd> to toggle &middot; <kbd>Double-click</kbd> to answer
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
